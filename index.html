<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Message Card ✨</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Matrix background canvas -->
    <canvas id="matrixCanvas"></canvas>

    <div class="container">
        <h1>💌 Magic Message Card</h1>

        <input type="text" id="messageInput" placeholder="Type your magical message...">
        
        <div class="buttons">
            <button id="showMessageBtn" class="btn">Show Message</button>
            <button id="changeColorBtn" class="btn">Change Color</button>
            <button id="addNoteBtn" class="btn">Add Note</button>
            <button id="removeNoteBtn" class="btn">Remove Note</button>
            <button id="resetBtn" class="btn">Reset</button>
        </div>

        <div id="messageCard" class="card hidden">
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
